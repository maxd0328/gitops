config:
  gitopsTool: argo
  gitopsNamespace: argocd
  prefix: prd
  commonChart:
    repoURL: devops.derbserv.hq/_git/charts
    path: gitops/
    version: HEAD

environment:
  apps:
    keycloak:
      chart:
        repoURL: https://repo.helmforge.dev
        name: keycloak
        version: 3.0.3
      replicas: 1
      hostname: iam.derbserv.hq

  extras:
    db-cluster:
      replicas: 1
      storageSize: 500Mi
