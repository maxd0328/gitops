config:
  gitopsTool: argo
  gitopsNamespace: argocd
  prefix: prd
  commonChart:
    repoURL: https://devops.derbserv.hq/_git/charts
    path: gitops/
    version: HEAD

environment:
  apps:
    gitea:
      chart:
        repoURL: https://dl.gitea.com/charts
        name: gitea
        version: 12.6.0
      replicas: 1

  extras:
    keycloak:
      replicas: 1

    db-cluster:
      replicas: 1
      storageSize: 500Mi

  global:
    argocd_oidc: true
    hostnames:
      argocd: argocd.derbserv.hq
      iam: iam.derbserv.hq
      devops: devops.derbserv.hq
