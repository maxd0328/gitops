global:
  gitopsNamespace: argocd
  prefix: stg
  commonChart:
    repoURL: https://devops.derbserv.hq/_git/charts
    path: gitops/
    version: HEAD

config:
  hostnames:
    argocd: argocd.derbserv.hq
    iam: iam.stg.derbserv.hq
    devops: devops.stg.derbserv.hq

  pgCluster:
    replicas: 1
    storageSize: 500Mi

  keycloak:
    replicas: 1
    registerArgocd: true

  gitea:
    version: 12.6.0
    replicas: 1

  headlamp:
    version: 0.43.0
    replicas: 1
