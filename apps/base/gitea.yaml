base:
  gitea: |
    GitOps-Chart/resource-type: argocd-application
    chart:
      repoURL: https://dl.gitea.com/charts
      name: gitea
      version: {{ .config.gitea.version }}
    values:
      global:
        replicaCount: {{ .config.gitea.replicas }}

      gitea:
        config:
          APP_NAME: DevOps
          
          database:
            DB_TYPE: postgres
            HOST: pg-cluster-rw.{{ .Release.Namespace }}.svc.cluster.local
            NAME: gitea

        oauth:
          - name: Derbserv
            provider: openidConnect
            existingSecret: iam-devops-creds
            autoDiscoverUrl: https://{{ .config.hostnames.iam }}/realms/derbserv/.well-known/openid-configuration
            scopes:
              - openid
              - profile
              - email

        additionalConfigFromEnvs:
          - name: GITEA__DATABASE__USER
            valueFrom:
              secretKeyRef:
                name: pg-gitea-user
                key: username
          - name: GITEA__DATABASE__PASSWD
            valueFrom:
              secretKeyRef:
                name: pg-gitea-user
                key: password

      ingress:
        enabled: true
        hosts:
          - host: {{ .config.hostnames.devops }}
            paths:
              - path: /

      postgresql:
        enabled: false

      postgresql-ha:
        enabled: false

      valkey-cluster:
        enabled: false

      valkey:
        enabled: true

  gitea-db: |
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: gitea
    spec:
      name: gitea
      owner: gitea
      cluster:
        name: pg-cluster
