base:
  keycloakRealm: |
    apiVersion: k8s.keycloak.org/v2beta1
    kind: KeycloakRealmImport
    metadata:
      name: realm
    spec:
      keycloakCRName: keycloak

      placeholders:
        {{- if .config.keycloak.registerArgocd }}
        ARGOCD_CLIENT_ID:
          secret:
            name: iam-argocd-creds
            key: key
        ARGOCD_CLIENT_SECRET:
          secret:
            name: iam-argocd-creds
            key: secret
        {{- end }}
        DEVOPS_CLIENT_ID:
          secret:
            name: iam-devops-creds
            key: key
        DEVOPS_CLIENT_SECRET:
          secret:
            name: iam-devops-creds
            key: secret
        HEADLAMP_CLIENT_ID:
          secret:
            name: iam-headlamp-creds
            key: OIDC_CLIENT_ID
        HEADLAMP_CLIENT_SECRET:
          secret:
            name: iam-headlamp-creds
            key: OIDC_CLIENT_SECRET

      realm:
        realm: derbserv
        displayName: Derbserv
        enabled: true

        groups:
          {{- if .config.keycloak.registerArgocd }}
          - name: argocd-admins
          - name: argocd-viewers
          {{- end }}

        clientScopes:
          - name: email
            description: 'OpenID Connect built-in scope: email'
            protocol: openid-connect
            attributes:
              include.in.token.scope: 'true'
              display.on.consent.screen: 'true'
              consent.screen.text: ${emailScopeConsentText}
            protocolMappers:
              - name: email
                protocol: openid-connect
                protocolMapper: oidc-usermodel-property-mapper
                consentRequired: false
                config:
                  userinfo.token.claim: 'true'
                  user.attribute: email
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  claim.name: email
                  jsonType.label: String
              - name: email verified
                protocol: openid-connect
                protocolMapper: oidc-usermodel-property-mapper
                consentRequired: false
                config:
                  userinfo.token.claim: 'true'
                  user.attribute: emailVerified
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  claim.name: email_verified
                  jsonType.label: boolean
          - name: profile
            description: 'OpenID Connect built-in scope: profile'
            protocol: openid-connect
            attributes:
              include.in.token.scope: 'true'
              display.on.consent.screen: 'true'
              consent.screen.text: ${profileScopeConsentText}
            protocolMappers:
              - name: family name
                protocol: openid-connect
                protocolMapper: oidc-usermodel-property-mapper
                consentRequired: false
                config:
                  userinfo.token.claim: 'true'
                  user.attribute: lastName
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  claim.name: family_name
                  jsonType.label: String
              - name: given name
                protocol: openid-connect
                protocolMapper: oidc-usermodel-property-mapper
                consentRequired: false
                config:
                  userinfo.token.claim: 'true'
                  user.attribute: firstName
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  claim.name: given_name
                  jsonType.label: String
              - name: username
                protocol: openid-connect
                protocolMapper: oidc-usermodel-property-mapper
                consentRequired: false
                config:
                  userinfo.token.claim: 'true'
                  user.attribute: username
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  claim.name: preferred_username
                  jsonType.label: String
          - name: roles
            description: OpenID Connect scope for add user roles to the access token
            protocol: openid-connect
            attributes:
              include.in.token.scope: 'false'
              display.on.consent.screen: 'true'
              consent.screen.text: ${rolesScopeConsentText}
            protocolMappers:
              - name: realm roles
                protocol: openid-connect
                protocolMapper: oidc-usermodel-realm-role-mapper
                consentRequired: false
                config:
                  access.token.claim: 'true'
                  claim.name: realm_access.roles
                  jsonType.label: String
                  multivalued: 'true'
              - name: audience resolve
                protocol: openid-connect
                protocolMapper: oidc-audience-resolve-mapper
                consentRequired: false
                config: {}
              - name: client roles
                protocol: openid-connect
                protocolMapper: oidc-usermodel-client-role-mapper
                consentRequired: false
                config:
                  access.token.claim: 'true'
                  claim.name: resource_access.${client_id}.roles
                  jsonType.label: String
                  multivalued: 'true'
          - name: groups
            protocol: openid-connect
            protocolMappers:
              - name: groups
                protocol: openid-connect
                protocolMapper: oidc-group-membership-mapper
                config:
                  claim.name: groups
                  full.path: 'false'
                  id.token.claim: 'true'
                  access.token.claim: 'true'
                  userinfo.token.claim: 'true'

        clients:
          {{- if .config.keycloak.registerArgocd }}
          - clientId: ${ARGOCD_CLIENT_ID}
            secret: ${ARGOCD_CLIENT_SECRET}
            name: Argo CD
            enabled: true

            protocol: openid-connect
            publicClient: false
            standardFlowEnabled: true
            directAccessGrantsEnabled: false

            redirectUris:
              - https://{{ .config.hostnames.argocd }}/auth/callback
            webOrigins:
              - https://{{ .config.hostnames.argocd }}

            defaultClientScopes:
              - profile
              - email
              - roles
              - groups
          {{- end }}

          - clientId: ${DEVOPS_CLIENT_ID}
            secret: ${DEVOPS_CLIENT_SECRET}
            name: DevOps
            enabled: true

            protocol: openid-connect
            publicClient: false
            standardFlowEnabled: true
            directAccessGrantsEnabled: false

            redirectUris:
              - https://{{ .config.hostnames.devops }}/user/oauth2/derbserv/callback
            webOrigins:
              - https://{{ .config.hostnames.devops }}

            defaultClientScopes:
              - profile
              - email
              - roles
              - groups

          - clientId: ${HEADLAMP_CLIENT_ID}
            secret: ${HEADLAMP_CLIENT_SECRET}
            name: Headlamp
            enabled: true

            protocol: openid-connect
            publicClient: false
            standardFlowEnabled: true
            directAccessGrantsEnabled: false

            redirectUris:
              - https://{{ .config.hostnames.headlamp }}/oidc-callback
            webOrigins:
              - https://{{ .config.hostnames.headlamp }}

            defaultClientScopes:
              - profile
              - email
              - roles
              - groups
    
  iamArgocdCreds: |
    {{- if .config.keycloak.registerArgocd }}
    apiVersion: v1
    kind: Secret
    metadata:
      name: iam-argocd-creds
      annotations:
        secret-generator.v1.mittwald.de/autogenerate: secret
        reflector.v1.k8s.emberstack.com/reflection-allowed: 'true'
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: 'argocd'
    type: Opaque
    data:
      key: {{ "argocd" | b64enc }}
    {{- end }}

  iamArgocdCredsMirror: |
    {{- if .config.keycloak.registerArgocd }}
    apiVersion: v1
    kind: Secret
    metadata:
      name: iam-argocd-creds
      namespace: argocd
      annotations:
        reflector.v1.k8s.emberstack.com/reflects: '{{ .Release.Namespace }}/argocd-client-creds'
      labels:
        app.kubernetes.io/part-of: argocd
    type: Opaque
    {{- end }}

  iamDevopsCreds: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: iam-devops-creds
      annotations:
        secret-generator.v1.mittwald.de/autogenerate: secret
    type: Opaque
    data:
      key: {{ "devops" | b64enc }}

  iamHeadlampCreds: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: iam-headlamp-creds
      annotations:
        secret-generator.v1.mittwald.de/autogenerate: OIDC_CLIENT_SECRET
    type: Opaque
    data:
      OIDC_CLIENT_ID: {{ "headlamp" | b64enc }}
