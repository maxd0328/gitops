base:
  extras:
    keycloak: |
      apiVersion: k8s.keycloak.org/v2beta1
      kind: Keycloak
      metadata:
        name: keycloak
      spec:
        instances: {{ .replicas }}
        db:
          vendor: postgres
          host: db-cluster-rw.{{ .Release.Namespace }}.svc.cluster.local
          database: keycloak
          usernameSecret:
            name: keycloak-db-user
            key: username
          passwordSecret:
            name: keycloak-db-user
            key: password
        http:
          httpEnabled: true
        hostname:
          hostname: {{ .hostname }}
        proxy:
          headers: xforwarded

    keycloak-db: |
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      metadata:
        name: keycloak
      spec:
        name: keycloak
        owner: keycloak
        cluster:
          name: db-cluster

    keycloak-realm: |
      apiVersion: k8s.keycloak.org/v2beta1
      kind: KeycloakRealmImport
      metadata:
        name: realm
      spec:
        keycloakCRName: keycloak
        realm:
          realm: derbserv
          displayName: Derbserv
          enabled: true
