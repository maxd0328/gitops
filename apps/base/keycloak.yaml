base:
  keycloak: |
    apiVersion: k8s.keycloak.org/v2beta1
    kind: Keycloak
    metadata:
      name: keycloak
    spec:
      instances: {{ .config.keycloak.replicas }}
      db:
        vendor: postgres
        host: pg-cluster-rw.{{ .Release.Namespace }}.svc.cluster.local
        database: keycloak
        usernameSecret:
          name: pg-keycloak-user
          key: username
        passwordSecret:
          name: pg-keycloak-user
          key: password
      http:
        httpEnabled: true
      hostname:
        hostname: {{ .config.hostnames.iam }}
      proxy:
        headers: xforwarded

  keycloak-db: |
    apiVersion: postgresql.cnpg.io/v1
    kind: Database
    metadata:
      name: keycloak
    spec:
      name: keycloak
      owner: keycloak
      cluster:
        name: pg-cluster
