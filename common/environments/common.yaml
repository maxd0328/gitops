config:
  gitopsTool: argo
  gitopsNamespace: argocd
  noPrefix: true
  commonChart:
    repoURL: devops.derbserv.hq/_git/charts
    path: gitops/
    version: HEAD

environment:
  apps:
    cloudnative-pg:
      namespace: cloudnative-pg
      chart:
        repoURL: https://cloudnative-pg.github.io/charts
        name: cloudnative-pg
        version: 0.28.3

    secret-generator:
      namespace: secret-generator
      chart:
        repoURL: https://helm.mittwald.de
        name: kubernetes-secret-generator
        version: 3.4.1

    keycloak-operator:
      namespace: keycloak
      chart:
        repoURL: https://github.com/maxd0328/charts.git
        path: keycloak-operator/
        version: HEAD
